<script>
    // ============================================================
    // 配置（已填入你的真实 DeepSeek API Key）
    // ============================================================
    const DEEPSEEK_API_KEY = "请在此处输入你的deepseekapi";
    const DEEPSEEK_API_URL = "https://api.deepseek.com/v1/chat/completions";
    const AI_MODEL = "deepseek-chat";

    let hosts = [];
    let currentLiveHost = null;
    let currentWorkHost = null;
    let currentWork = null;
    let messageHistory = {};
    let unreadCount = {};
    let currentChatHost = null;
    let observer = null;
    let currentPlayingIndex = -1;
// ============================================================
// 后端服务地址
// ============================================================
const API_URL = 'http://localhost:3000';

// ============================================================
// 后端 API 调用函数
// ============================================================

// 获取聊天记录
async function loadChatsFromServer(hostName) {
    try {
        const res = await fetch(`${API_URL}/api/chat/${encodeURIComponent(hostName)}`);
        return await res.json();
    } catch (e) {
        console.warn('加载聊天记录失败，使用本地缓存:', e);
        return null;
    }
}

// 保存聊天记录到后端
async function saveChatsToServer(hostName, messages) {
    try {
        const res = await fetch(`${API_URL}/api/chat/${encodeURIComponent(hostName)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(messages)
        });
        return await res.json();
    } catch (e) {
        console.warn('保存聊天记录到后端失败:', e);
        return null;
    }
}

// 保存游戏存档到后端
async function saveGameToServer(key, data) {
    try {
        const res = await fetch(`${API_URL}/api/save/${key}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return await res.json();
    } catch (e) {
        console.warn('保存存档到后端失败:', e);
        return null;
    }
}

// 从后端加载游戏存档
async function loadGameFromServer(key) {
    try {
        const res = await fetch(`${API_URL}/api/save/${key}`);
        return await res.json();
    } catch (e) {
        console.warn('加载存档失败:', e);
        return null;
    }
}

// ================= 加载聊天记录（从后端加载） =================
messageHistory = {};
unreadCount = {};

// 先尝试从后端加载，失败则用 localStorage 降级
async function loadAllChats() {
    if (!hosts || hosts.length === 0) {
        console.warn('⚠️ hosts 尚未加载，稍后重试');
        return;
    }
    
    console.log('📡 正在从后端加载聊天记录...');
    
    for (const host of hosts) {
        const name = host.name;
        const data = await loadChatsFromServer(name);
        if (data && Array.isArray(data)) {
            messageHistory[name] = data;
            console.log(`✅ 从后端加载 ${name} 的聊天记录: ${data.length} 条`);
        } else {
            // 降级：从 localStorage 读取
            const saved = localStorage.getItem(`messageHistory_${name}`);
            if (saved) {
                try {
                    messageHistory[name] = JSON.parse(saved);
                    console.log(`📁 从本地缓存加载 ${name} 的聊天记录: ${messageHistory[name].length} 条`);
                } catch(e) {
                    messageHistory[name] = [];
                }
            } else {
                messageHistory[name] = [];
            }
        }
    }
    console.log('✅ 所有聊天记录加载完成');
}

// ================= 好感度系统 =================
let affection = JSON.parse(localStorage.getItem('affection') || '{}');
let lastChatTime = JSON.parse(localStorage.getItem('lastChatTime') || '{}');
let activeMessageInterval = null;
let isSending = false;  // 发送冷却

// 保存好感度
function saveAffection() {
    localStorage.setItem('affection', JSON.stringify(affection));
}

// 增加好感度
function addAffection(hostName, amount) {
    if (!affection[hostName]) affection[hostName] = 0;
    affection[hostName] = Math.min(affection[hostName] + amount, 100);
    saveAffection();
    updateAffectionDisplay();
    return affection[hostName];
}

// 获取好感度等级
function getAffectionLevel(hostName) {
    const val = affection[hostName] || 0;
    if (val < 20) return "陌生人";
    if (val < 40) return "认识";
    if (val < 60) return "熟悉";
    if (val < 80) return "亲密";
    return "热恋";
}

// 更新好感度显示
function updateAffectionDisplay() {
    const affEl = document.getElementById('affectionDisplay');
    if (affEl && currentChatHost) {
        const aff = affection[currentChatHost.name] || 0;
        const level = getAffectionLevel(currentChatHost.name);
        affEl.innerText = `${aff} (${level})`;
    }
}

// ================= 世界书/Lorebook =================
const lorebook = {
    keywords: {
        "咖啡": "街角那家你常去的咖啡店，老板是个温和的老爷爷，店里总是飘着焦糖的香气。",
        "下雨": "窗外下着小雨，雨滴打在玻璃上发出清脆的声音，空气里弥漫着潮湿的泥土味。",
        "晚安": "夜深了，月光透过窗帘洒进来，整个世界都安静下来了。",
        "想你了": "每次你说想我的时候，我的心跳都会漏一拍...",
        "礼物": "你送我的每件礼物我都好好收着，放在床头，每天睡前都会看一眼。"
    },
    worldSetting: "用户平平无奇，系统里都是他刷到的平台小视频，用户可以和角色之间交流甚至见面（取决于角色的意愿）。"
};

// 应用世界书
function applyLorebook(userMessage, systemPrompt) {
    let extraContext = "";
    for (const [keyword, content] of Object.entries(lorebook.keywords)) {
        if (userMessage.includes(keyword)) {
            extraContext += `\n【背景知识】${content}\n`;
        }
    }
    if (extraContext) {
        systemPrompt += extraContext;
    }
    return systemPrompt;
}

// ================= 打字机效果（每打一个字都滚动到底部） =================
async function typeMessage(element, text, speed = 30) {
    element.innerHTML = '';
    const container = document.getElementById('chatMessages');
    
    for (let i = 0; i < text.length; i++) {
        element.innerHTML += text[i];
        // ✅ 每打一个字就滚动到底部
        if (container) {
            container.scrollTop = container.scrollHeight;
        }
        await new Promise(resolve => setTimeout(resolve, speed));
    }
    // ✅ 最后再滚一次，确保到底
    if (container) {
        container.scrollTop = container.scrollHeight;
    }
}

// ================= 主动发消息 =================
function startActiveMessaging(host) {
    if (activeMessageInterval) clearInterval(activeMessageInterval);
    
    activeMessageInterval = setInterval(async () => {
        const lastTime = lastChatTime[host.name] || 0;
        const twoHoursAgo = Date.now() - 2 * 60 * 60 * 1000;
        if (lastTime < twoHoursAgo) return;
        
        const affValue = affection[host.name] || 0;
        if (affValue < 30) return;
        
        const activeMessages = [
            "你好有什么事吗？",
        ];
        const randomMsg = activeMessages[Math.floor(Math.random() * activeMessages.length)];
        
        if (!messageHistory[host.name]) messageHistory[host.name] = [];
        messageHistory[host.name].push({ sender: 'ai', text: randomMsg });
        
        if (currentChatHost && currentChatHost.name === host.name) {
            renderChatMessages();
            showToast("有人给你发消息啦");
        }
        updateUnreadBadge();
    }, 5 * 60 * 1000);
}
    // 辅助函数：正确显示头像
    function getAvatarHtml(avatar, className) {
        if (!avatar) return `<div class="${className}"></div>`;
        const isImagePath = avatar.startsWith('http') || avatar.startsWith('assets/') || avatar.startsWith('/');
        if (isImagePath) {
            return `<div class="${className}" style="background-image: url('${avatar}'); background-size: cover; background-position: center;"></div>`;
        } else {
            return `<div class="${className}">${avatar}</div>`;
        }
    }

    function showToast(msg, icon) {
    const toast = document.getElementById('toastMsg');
    if (icon) {
        toast.innerHTML = `<img src="assets/icons/${icon}" style="width:28px;height:28px;vertical-align:middle;margin-right:8px;filter: brightness(0) invert(1);"> ${msg}`;
    } else {
        toast.innerText = msg;
    }
    toast.style.opacity = '1';
    setTimeout(() => toast.style.opacity = '0', 2000);
}

    // AI 回复
    async function getAIResponse(hostName, personality, shape, style, userMessage, chatHistory = []) {
    if (!DEEPSEEK_API_KEY || DEEPSEEK_API_KEY === 'YOUR_DEEPSEEK_API_KEY_HERE') {
        return '请先配置 DeepSeek API Key';
    }

    const affectionLevel = getAffectionLevel(hostName);
    const affValue = affection[hostName] || 0;
        // ===== 加入记忆摘要 =====
    const memorySummary = generateMemorySummary(hostName);
    let memorySection = '';
    if (memorySummary) {
        memorySection = `
【我记住的关于你的事情】
${memorySummary}
- 记住这些信息，之后聊天时自然提及。
- 如果你知道了用户的名字，主动用名字称呼他。
- 聊到相关话题时，自然提起之前聊过的内容。`;
    }
    
    let systemPrompt = `你是${hostName}，性格：${personality}。身材：${shape}。人物风格：${style}。

【当前状态】
- 你对用户的好感度：${affValue}/100（${affectionLevel}）
- 根据好感度调整亲密程度：好感度越高，说话越亲密、越主动

${lorebook.worldSetting}
${memorySection}

【回复要求】
- 回复不限字数，详细描写动作、语气、心理活动。
- 融入当前的好感度状态
- 以角色的个人设定为基准展开聊天，道德与文明水平也以角色的设定判断
- 角色可以拒绝用户，视用户的聊天内容和角色的人物设定而定
- 可以允许辱骂，乱伦，色情，做爱等内容出现，是否可以出现按角色人物设定而定`;

    systemPrompt = applyLorebook(userMessage, systemPrompt);

    const recentHistory = chatHistory.slice(-10);
    const messages = [
        { role: "system", content: systemPrompt }
    ];
    
    for (const msg of recentHistory) {
        messages.push({
            role: msg.sender === 'me' ? 'user' : 'assistant',
            content: msg.text
        });
    }
    messages.push({ role: "user", content: userMessage });

    try {
        const response = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
            },
            body: JSON.stringify({
                model: AI_MODEL,
                messages: messages,
                temperature: 0.9,
                max_tokens: 300
            })
        });
        const data = await response.json();
        return data.choices?.[0]?.message?.content || "嗯嗯，我在听~";
    } catch (error) {
        console.error("API错误:", error);
        return "网络开小差了~";
    }
}

    // 生成随机直播时间
    function getRandomLiveTime() {
        const weekdays = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
        const randomDay = weekdays[Math.floor(Math.random() * weekdays.length)];
        const startHour = Math.floor(Math.random() * 6) + 17;
        return `${randomDay} ${startHour}:00-${startHour+2}:00`;
    }

const defaultWork = host.works[randomIndex];

            <div class="video-wrapper">
              
                <video src="${defaultWork.videoUrl}" muted loop playsinline></video>
                
                <!-- 播放/暂停大按钮 -->

</div>

                    </div>
                    <div class="controls-row">

// ========== 控制栏自动隐藏 ==========
let hideTimeout = null;
let idleTimeout = null;

function setupControlsAutoHide(feedItem, controls) {
    if (!controls) return;
    
    const video = feedItem.querySelector('video');
    const wrapper = feedItem.querySelector('.video-wrapper');
    
    // 清除旧定时器
    if (hideTimeout) {
        clearTimeout(hideTimeout);
        hideTimeout = null;
    }
    if (idleTimeout) {
        clearTimeout(idleTimeout);
        idleTimeout = null;
    }
    
    // 显示控制栏（显示鼠标）
    function showControls() {
        controls.classList.add('show');
        controls.classList.remove('hidden-cursor');
        feedItem.style.cursor = 'default';
        if (wrapper) wrapper.style.cursor = 'default';
        if (hideTimeout) {
            clearTimeout(hideTimeout);
            hideTimeout = null;
        }
        if (idleTimeout) {
            clearTimeout(idleTimeout);
            idleTimeout = null;
        }
        startIdleTimer();
    }
    
    // 隐藏控制栏（隐藏鼠标）
    function hideControls() {
        controls.classList.remove('show');
        controls.classList.add('hidden-cursor');
        feedItem.style.cursor = 'none';
        if (wrapper) wrapper.style.cursor = 'none';
        if (hideTimeout) {
            clearTimeout(hideTimeout);
            hideTimeout = null;
        }
        if (idleTimeout) {
            clearTimeout(idleTimeout);
            idleTimeout = null;
        }
    }
    
    // 空闲计时器：1秒无操作隐藏（不管鼠标在哪）
    function startIdleTimer() {
        if (idleTimeout) {
            clearTimeout(idleTimeout);
            idleTimeout = null;
        }
        idleTimeout = setTimeout(() => {
            hideControls();  // 👈 直接隐藏，不检查任何区域
            idleTimeout = null;
        }, 1000);
    }
    
    // 鼠标进入视频 -> 显示
    feedItem.addEventListener('mouseenter', showControls);
    
    // 鼠标在视频上移动 -> 立即显示
    feedItem.addEventListener('mousemove', showControls);
    
    // 鼠标离开视频 -> 立即隐藏
    feedItem.addEventListener('mouseleave', hideControls);
    
    // 控制栏相关
    controls.addEventListener('mouseenter', function() {
        controls.classList.add('show');
        controls.classList.remove('hidden-cursor');
        feedItem.style.cursor = 'default';
        if (wrapper) wrapper.style.cursor = 'default';
        if (hideTimeout) {
            clearTimeout(hideTimeout);
            hideTimeout = null;
        }
        if (idleTimeout) {
            clearTimeout(idleTimeout);
            idleTimeout = null;
        }
    });
    
    controls.addEventListener('mouseleave', function() {
        if (hideTimeout) {
            clearTimeout(hideTimeout);
        }
        hideTimeout = setTimeout(() => {
            hideControls();
            hideTimeout = null;
        }, 1000);
    });
}
// ========== 连播功能 ==========
let loopStates = {};

function toggleLoop(hostId, btn) {
    // 切换状态
    loopStates[hostId] = !loopStates[hostId];
    
    const feedItem = document.querySelector(`.feed-item[data-host-id="${hostId}"]`);
    const video = feedItem ? feedItem.querySelector('video') : null;
    
    // 先移除之前的监听（清理旧状态）
    if (video) {
        video.removeEventListener('ended', onVideoEnded);
    }
    
    if (loopStates[hostId]) {
        // 连播开启：取消循环，播完跳下一个
        btn.textContent = '连播';
        btn.style.color = '#87CEFA';
        showToast(' 连播已开启');
        
        if (video) {
            video.loop = false;  // 👈 取消单视频循环
            video.addEventListener('ended', onVideoEnded);
        }
    } else {
        // 连播关闭：恢复默认循环
        btn.textContent = '连播';
        btn.style.color = 'white';
        showToast('连播已关闭');
        
        if (video) {
            video.loop = true;   // 👈 恢复单视频循环
            video.removeEventListener('ended', onVideoEnded);
        }
    }
}
function onVideoEnded(e) {
    const video = e.target;
    const feedItem = video.closest('.feed-item');
    if (!feedItem) return;
    
    const currentHostId = parseInt(feedItem.getAttribute('data-host-id'));
    
    // 检查这个视频的连播是否开启
    if (!loopStates[currentHostId]) return;
    
    // 找到下一个视频
    const allFeedItems = document.querySelectorAll('.feed-item');
    let nextItem = null;
    let found = false;
    
    for (const item of allFeedItems) {
        if (found) {
            nextItem = item;
            break;
        }
        if (parseInt(item.getAttribute('data-host-id')) === currentHostId) {
            found = true;
        }
    }
    
    // 如果没找到下一个（已经是最后一个），随机选一个
    if (!nextItem && allFeedItems.length > 0) {
        // 随机选择一个视频（不能是自己）
        const randomIndex = Math.floor(Math.random() * allFeedItems.length);
        nextItem = allFeedItems[randomIndex];
        
        // 如果随机到的是自己，就选下一个
        if (parseInt(nextItem.getAttribute('data-host-id')) === currentHostId) {
            // 尝试偏移1-3个位置
            let offset = Math.floor(Math.random() * 3) + 1;
            let newIndex = (randomIndex + offset) % allFeedItems.length;
            nextItem = allFeedItems[newIndex];
        }
        
        console.log('🔁 已到末尾，随机跳转到:', parseInt(nextItem.getAttribute('data-host-id')));
    }
    
    if (nextItem) {
        // 滚动到下一个视频
        nextItem.scrollIntoView({ behavior: 'smooth' });
        
        setTimeout(() => {
            const nextVideo = nextItem.querySelector('video');
            if (nextVideo) {
                nextVideo.muted = false;
                nextVideo.play().catch(() => {});
            }
        }, 400);
    }
}

// ========== 进度条绑定 ==========
function setupProgressBar(hostId, video) {
    const progressFill = document.getElementById(`progressFill_${hostId}`);
    const timeDisplay = document.getElementById(`timeDisplay_${hostId}`);
    const progressBar = document.getElementById(`progressBar_${hostId}`);
    
    if (!progressFill || !timeDisplay) return;
    
    // 移除旧监听
    video.removeEventListener('timeupdate', updateProgress);
    video.removeEventListener('loadedmetadata', updateDuration);
    
    function updateProgress() {
        if (video.duration) {
            const percent = (video.currentTime / video.duration) * 100;
            progressFill.style.width = `${percent}%`;
        }
        timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    }
    
    function updateDuration() {
        timeDisplay.textContent = `00:00 / ${formatTime(video.duration)}`;
    }
    
    video.addEventListener('timeupdate', updateProgress);
    video.addEventListener('loadedmetadata', updateDuration);
    
    // 点击进度条跳转
    if (progressBar) {
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            if (video.duration) {
                video.currentTime = percent * video.duration;
            }
        });
    }
}

// ========== 时间格式化 ==========
function formatTime(seconds) {
    if (!seconds || isNaN(seconds) || !isFinite(seconds)) return '00:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

}

let activeMessageTimers = {};

// 关键词配置（触发主动消息的关键词）
const TRIGGER_KEYWORDS = [
    "明天", "下次", "等会", "等会儿", "待会", "待会儿",
    "一会", "一会儿", "稍后", "之后", "过会", "过一会儿",
    "等一下", "等一等", "回头", "晚点", "改天","秒后","分钟后"
];

// 主动消息池（根据亲密度不同）
function getActiveMessages(affectionLevel) {
    const baseMessages = [
        "你不是说等会要找我吗？",
        "说好的找我",
        "等你半天了😢",
        "你刚才说等会要给我看东西，我还在等",
        "从你说要找我到现在，我感觉过了一个世纪了",
        "过那么久你都没回，是不是在忙呀？",
        "你说的等会儿，是等多久",
    ];
    
    // 亲密度越高，消息越亲密
    if (affectionLevel >= 80) {
        return [
            ...baseMessages,
            "说好的等会陪我，我可记着",
            
        ];
    } else if (affectionLevel >= 50) {
        return [
            ...baseMessages,
            "你说等会找我啥时候？",
            "还在等你呢，你不会忘了吧？",
            "说好的事情可不能反悔",
        ];
    } else {
        return baseMessages;
    }
}

// ====检测是否包含触发关键词
function hasTriggerKeyword(text) {
    // 从后往前检查（因为一般是后半句）
    const lastHalf = text.length > 20 ? text.slice(-20) : text;
    // 检查整句和后半句
    const fullText = text.toLowerCase();
    const lastHalfLower = lastHalf.toLowerCase();
    
    for (const keyword of TRIGGER_KEYWORDS) {
        if (fullText.includes(keyword) || lastHalfLower.includes(keyword)) {
            return true;
        }
    }
    return false;
}

// =======判断是否应该触发主动消息
function shouldTriggerActiveMessage(hostName, userMessage) {
    const affValue = affection[hostName] || 0;
    
    // 条件1：亲密度 >= 30
    if (affValue < 30) return false;
    
    // 条件2：包含触发关键词
    if (!hasTriggerKeyword(userMessage)) return false;
    
    return true;
}

// ========调度主动消息
function scheduleActiveMessage(hostName, userMessage, chatHistory) {
    // 如果已经有定时器，先取消
    if (activeMessageTimers[hostName]) {
        clearTimeout(activeMessageTimers[hostName]);
        delete activeMessageTimers[hostName];
    }
    
    // 随机延迟时间（30秒 - 2分钟）
    const delay = 30000 + Math.random() * 90000; // 30s ~ 120s
    
    // 记录触发上下文
    const triggerContext = {
        userMessage: userMessage,
        timestamp: Date.now(),
       
    };
    localStorage.setItem(`trigger_${hostName}`, JSON.stringify(triggerContext));
    
    console.log(`⏰ 已安排主动消息 ${hostName}，将在 ${Math.round(delay/1000)} 秒后发送`);
    
    activeMessageTimers[hostName] = setTimeout(async () => {
      
        // 检查是否已经发送过（防止重复）
        const triggerKey = `trigger_${hostName}`;
        const savedTrigger = localStorage.getItem(triggerKey);
        if (savedTrigger) {
            const data = JSON.parse(savedTrigger);
            // 如果超过10分钟了，就不再发送
            if (Date.now() - data.timestamp > 600000) {
                localStorage.removeItem(triggerKey);
                return;
            }
        }
        
        await sendActiveMessage(hostName, userMessage);
        localStorage.removeItem(triggerKey);
        delete activeMessageTimers[hostName];
    }, delay);
}

// 提取记忆（AI 提取关键信息）
function extractMemories(userMessage, aiReply, currentMemory) {
    const newMemory = JSON.parse(JSON.stringify(currentMemory));
    let hasNewInfo = false;
    
    // ===== 提取用户信息 =====
    const nameMatch = userMessage.match(/我叫(.{1,6})[，。,\s]?/);
    if (nameMatch && !newMemory.userInfo.name) {
        newMemory.userInfo.name = nameMatch[1];
        hasNewInfo = true;
    }
    
    // 年龄
    const ageMatch = userMessage.match(/(\d{1,3})\s*岁/);
    if (ageMatch && !newMemory.userInfo.age) {
        newMemory.userInfo.age = parseInt(ageMatch[1]);
        hasNewInfo = true;
    }
    
    // 城市/地方
    const cityMatch = userMessage.match(/(?:在|来自|住在)(.{1,4})(?:市|区|县|城)/);
    if (cityMatch && !newMemory.userInfo.city) {
        newMemory.userInfo.city = cityMatch[1];
        hasNewInfo = true;
    }
    
    // ===== 提取喜好 =====
    const likePatterns = [
        /我喜欢(.{1,10})/,
        /我爱(.{1,10})/,
        /我特别(.{1,10})/,
        /我最喜欢的.{0,5}(.{1,10})/
    ];
    for (const pattern of likePatterns) {
        const match = userMessage.match(pattern);
        if (match) {
            const like = match[1].trim();
            if (like.length > 1 && !newMemory.preferences.likes?.includes(like)) {
                if (!newMemory.preferences.likes) newMemory.preferences.likes = [];
                newMemory.preferences.likes.push(like);
                hasNewInfo = true;
            }
        }
    }
    
    // ===== 提取讨厌/不喜欢 =====
    const hateMatch = userMessage.match(/(?:我讨厌|我不喜欢|我反感)(.{1,10})/);
    if (hateMatch) {
        const hate = hateMatch[1].trim();
        if (!newMemory.preferences.dislikes) newMemory.preferences.dislikes = [];
        if (!newMemory.preferences.dislikes.includes(hate)) {
            newMemory.preferences.dislikes.push(hate);
            hasNewInfo = true;
        }
    }
    
    // ===== 提取重要事件 =====
    const eventPatterns = [
        /(?:今天|昨天|明天|上周|这周)(.{1,15})(?:了|过)/,
        /我(?:刚|正在|准备)(.{1,15})/
    ];
    for (const pattern of eventPatterns) {
        const match = userMessage.match(pattern);
        if (match) {
            const event = match[1].trim();
            if (event.length > 2) {
                const eventEntry = {
                    text: event,
                    timestamp: Date.now()
                };
                // 避免重复
                const isDuplicate = newMemory.events.some(e => 
                    e.text === eventEntry.text && 
                    (Date.now() - e.timestamp) < 60000
                );
                if (!isDuplicate) {
                    newMemory.events.push(eventEntry);
                    hasNewInfo = true;
                }
                // 只保留最近20条
                if (newMemory.events.length > 40) {
                    newMemory.events = newMemory.events.slice(-40);
                }
            }
        }
    }
    
    return { memory: newMemory, hasNewInfo };
}

// 生成记忆摘要（用于系统提示）
function generateMemorySummary(hostName) {
    const memory = getMemory(hostName);
    let summary = '';
    
    // 用户信息
    if (memory.userInfo.name) {
        summary += `用户的名字是：${memory.userInfo.name}。`;
    }
    if (memory.userInfo.age) {
        summary += `用户${memory.userInfo.age}岁。`;
    }
    if (memory.userInfo.city) {
        summary += `用户在${memory.userInfo.city}。`;
    }
    
    // 喜好
    if (memory.preferences.likes && memory.preferences.likes.length > 0) {
        summary += `用户喜欢：${memory.preferences.likes.join('、')}。`;
    }
    if (memory.preferences.dislikes && memory.preferences.dislikes.length > 0) {
        summary += `用户不喜欢：${memory.preferences.dislikes.join('、')}。`;
    }
    
    // 最近的对话记忆（最近5条）
    if (memory.events && memory.events.length > 0) {
        const recentEvents = memory.events.slice(-20);
        summary += `最近聊到的事情：${recentEvents.map(e => e.text).join('、')}。`;
    }
    
    return summary;
}

async function getVolcToken() {
    if (volcToken && Date.now() < tokenExpireTime - 300000) {
        return volcToken;
    }
    
    try {
        const response = await fetch('https://open.volcengine.com/api/auth/v2/access_token', {
            method: 'POST',

                access_key: VOLC_ACCESS_KEY,
                secret_key: VOLC_SECRET_KEY
            })
        });
        
        const result = await response.json();
        if (result.data && result.data.access_token) {
            volcToken = result.data.access_token;
            tokenExpireTime = Date.now() + (result.data.expires_in || 86400) * 1000;
            return volcToken;
        }
        return null;
    } catch (error) {
        console.error('Token获取错误:', error);
        return null;
    }
}

// ============================================================
// 3. 音频转 PCM
// ============================================================
async function audioToPCM(audioBlob) {
    const arrayBuffer = await audioBlob.arrayBuffer();
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    
    const sampleRate = 16000;
    const duration = audioBuffer.duration;
    const samples = Math.floor(duration * sampleRate);
    const pcmData = new Int16Array(samples);
    const sourceData = audioBuffer.getChannelData(0);
    
    for (let i = 0; i < samples; i++) {
        const index = Math.floor(i * audioBuffer.sampleRate / sampleRate);
        const value = sourceData[index] || 0;
        pcmData[i] = Math.max(-32768, Math.min(32767, Math.round(value * 32767)));
    }
    
    const bytes = new Uint8Array(pcmData.buffer);
    let binary = '';
    for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
}

// 4. 语音识别（豆包 ASR）
// ============================================================
async function recognizeSpeech(audioBlob) {
    try {
        const token = await getVolcToken();
        if (!token) {
            return fallbackRecognize();
        }
        
        const base64Audio = await audioToPCM(audioBlob);
        
        const response = await fetch('https://openspeech.bytedance.com/api/v1/asr', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                appid: VOLC_APP_ID,
                audio_format: 'pcm',
                sample_rate: 16000,
                bits: 16,
                channel: 1,
                speech: base64Audio
            })
        });
        
        const result = await response.json();
        if (result.code === 0 && result.data && result.data.text) {
            return result.data.text;
        } else {
            console.error('ASR错误:', result);
            return null;
        }
    } catch (error) {
        console.error('ASR异常:', error);
        return fallbackRecognize();
    }
}

// 降级：浏览器语音识别
function fallbackRecognize() {
    return new Promise((resolve) => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
            resolve(null);
            return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.continuous = false;
        
        recognition.onresult = function(event) {
            const result = event.results[event.results.length - 1];
            if (result.isFinal) {
                resolve(result[0].transcript);
            }
        };
        recognition.onerror = function() {
            resolve(null);
        };
        recognition.start();
    });
}

// 6. 录音核心
// ============================================================
function startRecording(element) {
    if (isRecording) return;
    
    navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
            streamRef = stream;
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            
            mediaRecorder.ondataavailable = event => {
                audioChunks.push(event.data);
            };
            
            mediaRecorder.start();
            isRecording = true;
            
            element.classList.add('recording');
            element.querySelector('.voice-press-hint').textContent = '🎤 录音中...';
            
            document.getElementById('recordingStatus').innerText = '🎤 录音中...';
            document.getElementById('recordingStatus').classList.add('show');
            
            startVolumeIndicator(stream, element);
        })
        .catch(err => {
            console.error('麦克风错误:', err);
            showToast('请允许麦克风权限');
            isPressing = false;
            element.classList.remove('pressing');
            element.querySelector('.voice-press-hint').textContent = '按住 说话';
        });
}

function stopRecordingAndSend() {
    if (!isRecording) return;
    isRecording = false;
    
    if (mediaRecorder) {
        mediaRecorder.stop();
        mediaRecorder = null;
    }
    
    if (streamRef) {
        streamRef.getTracks().forEach(track => track.stop());
        streamRef = null;
    }
    
    const bar = document.getElementById('voicePressBar');
    bar.classList.remove('recording');
    bar.querySelector('.voice-press-hint').textContent = '处理中...';
    document.getElementById('recordingStatus').classList.remove('show');
    
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    processVoice(audioBlob);
}

function cancelRecording() {
    if (isRecording) {
        isRecording = false;
        if (mediaRecorder) {
            mediaRecorder.stop();
            mediaRecorder = null;
        }
        if (streamRef) {
            streamRef.getTracks().forEach(track => track.stop());
            streamRef = null;
        }
    }
    const bar = document.getElementById('voicePressBar');
    bar.classList.remove('recording');
    bar.querySelector('.voice-press-hint').textContent = '按住 说话';
    document.getElementById('recordingStatus').classList.remove('show');
    audioChunks = [];
    if (volumeAnimId) {
        cancelAnimationFrame(volumeAnimId);
        volumeAnimId = null;
    }
}

// 7. 音量指示
// ============================================================
function startVolumeIndicator(stream, element) {
    if (volumeCtx) {
        volumeCtx.close();
        volumeCtx = null;
    }
    
    volumeCtx = new (window.AudioContext || window.webkitAudioContext)();
    volumeAnalyser = volumeCtx.createAnalyser();
    const source = volumeCtx.createMediaStreamSource(stream);
    source.connect(volumeAnalyser);
    volumeAnalyser.fftSize = 32;
    
    const dataArray = new Uint8Array(volumeAnalyser.frequencyBinCount);
    const levelBar = element.querySelector('.voice-press-level');
    
    function updateVolume() {
        if (!isRecording) {
            levelBar.style.width = '0%';
            return;
        }
        volumeAnalyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for (let i = 0; i < dataArray.length; i++) {
            sum += dataArray[i];
        }
        const avg = sum / dataArray.length;
        const percent = Math.min(100, (avg / 128) * 100);
        levelBar.style.width = percent + '%';
        
        if (isRecording) {
            volumeAnimId = requestAnimationFrame(updateVolume);
        } else {
            levelBar.style.width = '0%';
        }
    }
    updateVolume();
}

let currentBtn = null;

async function speakMessage(msgId) {
    const textEl = document.getElementById(msgId);
    if (!textEl) return;
    const text = textEl.innerText.trim();
    if (!text) return;
    
    const btn = textEl.parentElement.querySelector('.voice-play-btn');
    if (!btn) return;
    
    // 如果正在播放，停止
    if (currentAudio && !currentAudio.paused) {
        currentAudio.pause();
        currentAudio = null;
        if (currentBtn) {
            currentBtn.classList.remove('playing');
            currentBtn.textContent = '🔊';
            currentBtn = null;
        }
        if (currentBtn === btn) return;
    }
    
    // 获取豆包 Token
    const token = await getVolcToken();
    if (!token) {
        showToast('语音服务连接失败');
        return;
    }
    
    try {
        const response = await fetch('https://openspeech.bytedance.com/api/v1/tts', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                appid: VOLC_APP_ID,
                text: text,
                voice_type: 'zh_female_1',
                speed: 1.0,
                pitch: 1.0,
                volume: 1.0,
                audio_format: 'mp3'
            })
        });
        
        const result = await response.json();
        
        if (result.code === 0 && result.data && result.data.audio) {
            // 播放音频
            const audioBase64 = result.data.audio;
            const byteCharacters = atob(audioBase64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const audioBlob = new Blob([byteArray], { type: 'audio/mpeg' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            
            currentAudio = audio;
            currentBtn = btn;
            btn.classList.add('playing');
            btn.textContent = '⏸';
            showToast('🔊 播放中（豆包语音）');
            
            audio.onended = function() {
                btn.classList.remove('playing');
                btn.textContent = '🔊';
                currentAudio = null;
                currentBtn = null;
                URL.revokeObjectURL(audioUrl);
                showToast('✅ 播放完成');
            };
            
            audio.onerror = function() {
                btn.classList.remove('playing');
                btn.textContent = '🔊';
                currentAudio = null;
                currentBtn = null;
                showToast('❌ 播放失败');
                // 降级到浏览器 TTS
                fallbackSpeak(text, btn);
            };
            
            audio.play();
        } else {
            console.error('TTS错误:', result);
            showToast('语音合成失败，使用浏览器语音');
            fallbackSpeak(text, btn);
        }
    } catch (error) {
        console.error('TTS异常:', error);
        showToast('语音服务异常，使用浏览器语音');
        fallbackSpeak(text, btn);
    }
}

// 降级：浏览器 TTS
function fallbackSpeak(text, btn) {
    if (!('speechSynthesis' in window)) {
        showToast('浏览器不支持语音');
        return;
    }
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang.includes('zh'));
    if (zhVoice) utterance.voice = zhVoice;
    
    currentBtn = btn;
    btn.classList.add('playing');
    btn.textContent = '⏸';
    showToast('🔊 播放中（浏览器语音）');
    
    utterance.onend = function() {
        btn.classList.remove('playing');
        btn.textContent = '🔊';
        currentBtn = null;
        showToast('✅ 播放完成');
    };
    utterance.onerror = function() {
        btn.classList.remove('playing');
        btn.textContent = '🔊';
        currentBtn = null;
        showToast('❌ 播放失败');
    };
    window.speechSynthesis.speak(utterance);
}

let currentSpeakAudio = null;

async function speakText(text) {
    if (!text || text.length === 0) return;
    
    // 如果正在播放，先停止
    if (currentSpeakAudio && !currentSpeakAudio.paused) {
        currentSpeakAudio.pause();
        currentSpeakAudio = null;
    }
    
    try {
        const token = await getVolcToken();
        if (!token) {
            fallbackSpeakText(text);
            return;
        }
        
        const response = await fetch('https://openspeech.bytedance.com/api/v1/tts', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({
                appid: VOLC_APP_ID,
                text: text,
                voice_type: 'zh_female_1',
                speed: 1.0,
                pitch: 1.0,
                volume: 1.0,
                audio_format: 'mp3'
            })
        });
        
        const result = await response.json();
        console.log('📦 TTS响应:', result);
        
        if (result.code === 0 && result.data && result.data.audio) {
            const audioBase64 = result.data.audio;
            const byteCharacters = atob(audioBase64);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) {
                byteNumbers[i] = byteCharacters.charCodeAt(i);
            }
            const byteArray = new Uint8Array(byteNumbers);
            const audioBlob = new Blob([byteArray], { type: 'audio/mpeg' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            
            currentSpeakAudio = audio;
            showToast('🔊 AI正在说话（豆包）');
            
            audio.onended = function() {
                currentSpeakAudio = null;
                URL.revokeObjectURL(audioUrl);
                showToast('✅ 播放完成');
            };
            
            audio.onerror = function() {
                currentSpeakAudio = null;
                showToast('❌ 播放失败');
                fallbackSpeakText(text);
            };
            
            audio.play();
        } else {
            console.error('TTS错误:', result);
            fallbackSpeakText(text);
        }
    } catch (error) {
        console.error('TTS异常:', error);
        fallbackSpeakText(text);
    }
}

// 关注数据
let followData = JSON.parse(localStorage.getItem('followData') || '{}');
const CURRENT_USER = 'user_001';  // 当前用户ID

// 初始化关注数据
if (!followData[CURRENT_USER]) {
    followData[CURRENT_USER] = { following: [], followers: [] };
}
saveFollowData();

function saveFollowData() {
    localStorage.setItem('followData', JSON.stringify(followData));
}

// 获取好友列表（互关的人）
function getFriends() {
    const user = followData[CURRENT_USER];
    if (!user) return [];
    return user.following.filter(id => 
        followData[id] && followData[id].followers && followData[id].followers.includes(CURRENT_USER)
    );
}

// 检查是否已关注
function isFollowing(hostId) {
    const user = followData[CURRENT_USER];
    if (!user) return false;
    return user.following.includes(String(hostId));
}

// 检查是否互关
function isMutual(hostId) {
    return isFollowing(hostId) && 
           followData[String(hostId)] && 
           followData[String(hostId)].followers && 
           followData[String(hostId)].followers.includes(CURRENT_USER);
}

// 切换关注
function toggleFollow(hostId) {
    const userId = String(hostId);
    const user = followData[CURRENT_USER];
    if (!user) return;
    
    const idx = user.following.indexOf(userId);
    if (idx > -1) {
        // 取消关注
        user.following.splice(idx, 1);
        // 从对方的粉丝中移除
        if (followData[userId] && followData[userId].followers) {
            const fIdx = followData[userId].followers.indexOf(CURRENT_USER);
            if (fIdx > -1) followData[userId].followers.splice(fIdx, 1);
        }
        showToast('已取消关注');
    } else {
        // 关注
        user.following.push(userId);
        if (!followData[userId]) followData[userId] = { following: [], followers: [] };
        if (!followData[userId].followers) followData[userId].followers = [];
        if (!followData[userId].followers.includes(CURRENT_USER)) {
            followData[userId].followers.push(CURRENT_USER);
        }
        showToast('✅ 已关注');
    }
    
    saveFollowData();
    renderAllTabs();
    updateBadges();
}

// ===== Tab 切换 =====
let currentMessageTab = 'chat';

function switchMessageTab(tab) {
    currentMessageTab = tab;
    
    document.querySelectorAll('.tab-item').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
    });
    
    document.getElementById('messageList').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('groupListContainer').style.display = tab === 'group' ? 'flex' : 'none';
    document.getElementById('friendListContainer').style.display = tab === 'friend' ? 'flex' : 'none';
    
    if (tab === 'chat') renderMessageList();
    else if (tab === 'group') renderGroupList();
    else if (tab === 'friend') renderFriendList();
}

// ===== 渲染好友列表 =====
function renderFriendList() {
    const container = document.getElementById('friendListContainer');
    container.innerHTML = '';
    
    const friends = getFriends();
    
    if (friends.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <span class="empty-icon">👤</span>
                <div>还没有好友</div>
                <div style="font-size:12px;color:#555;margin-top:4px;">去关注一些主播，互关后成为好友</div>
            </div>
        `;
        return;
    }
    
    friends.forEach(hostId => {
        const host = hosts.find(h => h.id == hostId);
        if (!host) return;
        
        const mutual = isMutual(hostId);
        const following = isFollowing(hostId);
        
        const item = document.createElement('div');
        item.className = 'friend-item';
        item.innerHTML = `
            <div class="friend-avatar" style="background-image:url('${host.avatar || ''}');">
                ${!host.avatar ? '👤' : ''}
            </div>
            <div class="friend-info">
                <div class="friend-name">${host.name}</div>
               
            </div>
            <button class="friend-action-btn ${mutual ? 'mutual' : following ? 'following' : 'not-following'}" 
                    data-host="${host.id}">
                ${mutual ? '✅ 互关' : following ? '✓ 已关' : '+ 关注'}
            </button>
        `;
        
        item.querySelector('.friend-action-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleFollow(host.id);
        });
        
        // 点击进入聊天
        item.addEventListener('click', () => {
            openChatPopup(host);
        });
        
        container.appendChild(item);
    });
    const footer = document.createElement('div');
    footer.className = 'friend-count-footer';
    footer.innerHTML = `
        <span> ${friends.length} 个好友</span>
    `;
    container.appendChild(footer);
}

function updateBadges() {
    // 好友数量
    const friendCount = getFriends().length;
    document.getElementById('friendCountBadge').textContent = friendCount;
    
    // 消息未读
    let totalUnread = 0;
    for (let name in unreadCount) {
        totalUnread += (unreadCount[name] || 0);
    }
    const chatBadge = document.getElementById('chatUnreadBadge');
    if (totalUnread > 0) {
        chatBadge.style.display = 'inline';
        chatBadge.textContent = totalUnread;
    } else {
        chatBadge.style.display = 'none';
    }
}

const originalRenderMessageList = renderMessageList;
renderMessageList = function() {
    const container = document.getElementById('messageList');
    container.innerHTML = '';
    
    // 按最后消息时间排序
    const sortedHosts = [...hosts].sort((a, b) => {
        const aTime = messageHistory[a.name]?.slice(-1)[0]?.time || 0;
        const bTime = messageHistory[b.name]?.slice(-1)[0]?.time || 0;
        return bTime - aTime;
    });
    
    sortedHosts.forEach(host => {
        const lastMsg = messageHistory[host.name]?.slice(-1)[0]?.text || "点击开始聊天";
        const unread = unreadCount[host.name] || 0;
        const unreadBadge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';
        const isFriend = isMutual(host.id);
        
        const item = document.createElement('div');
        item.className = 'message-item';
        item.innerHTML = `
            ${getAvatarHtml(host.avatar, 'message-avatar')}
            <div class="message-preview">
                <div class="message-name">
                    ${host.name} 
                    ${unreadBadge}
                   ${isFriend ? `<img src="assets/icons/online.png" style="width:16px;height:16px;margin-right:2px;vertical-align:middle;margin-top:1px;" alt="在线"><span style="font-size:13px;color:#4caf50;margin-left:-2px;margin-top:-2px;">在线</span>` : ''}
                </div>
                <div class="message-text">${lastMsg.substring(0, 35)}</div>
                <div class="affection-bar" style="margin-top:6px;">
                    <div class="affection-fill" style="width: ${affection[host.name] || 0}%"></div>
                </div>
            </div>
            <button class="friend-action-btn ${isFollowing(host.id) ? 'following' : 'not-following'}" 
                    data-host="${host.id}" style="flex-shrink:0;margin-left:8px;">
                ${isFollowing(host.id) ? '✓ 已关' : '+ 关注'}
            </button>
        `;
        
        // 关注按钮事件
        item.querySelector('.friend-action-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            toggleFollow(host.id);
        });
        
        // 点击进入聊天
        item.addEventListener('click', () => {
            openChatPopup(host);
        });
        
        container.appendChild(item);
    });
};

const DEFAULT_WEATHER = {
    'spring': ['晴', '多云', '阴', '小雨'],
    'summer': ['晴', '多云', '雷阵雨', '阴'],
    'autumn': ['晴', '多云', '阴', '小雨'],
    'winter': ['晴', '多云', '阴', '小雪']
};

// 获取当前季节
function getSeason() {
    const month = new Date().getMonth();
    if (month >= 2 && month <= 4) return 'spring';
    if (month >= 5 && month <= 7) return 'summer';
    if (month >= 8 && month <= 10) return 'autumn';
    return 'winter';
}

// 获取城市所在区域
function getCityRegion(cityName) {
    const city = getCityByName(cityName);
    if (!city) return '华北';
    return city.region || '华北';
}

// 获取城市天气配置
function getCityWeatherConfig(cityName) {
    const region = getCityRegion(cityName);
    return REGION_WEATHER[region] || null;
}

// 获取今日城市天气（缓存，一天一换）
function getTodayWeatherForCity(cityName) {
    const today = new Date();
    const dateKey = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
    const cacheKey = 'weather_' + cityName;
    
    // 检查缓存
    let weatherData = localStorage.getItem(cacheKey);
    if (weatherData) {
        try {
            weatherData = JSON.parse(weatherData);
            if (weatherData.date === dateKey) {
                return weatherData.weather;
            }
        } catch (e) {}
    }
    
    // 生成新天气
    const season = getSeason();
    const config = getCityWeatherConfig(cityName);
    
    let weatherList, weights;
    if (config && config.season && config.season[season]) {
        weatherList = config.season[season];
        weights = config.weights[season] || null;
    } else {
        weatherList = DEFAULT_WEATHER[season] || ['晴', '多云'];
    }
    
    // 根据权重随机选择
    let selectedWeather;
    if (weights && weights.length === weatherList.length) {
        let totalWeight = weights.reduce((a, b) => a + b, 0);
        let random = Math.random() * totalWeight;
        for (let i = 0; i < weatherList.length; i++) {
            random -= weights[i];
            if (random <= 0) {
                selectedWeather = weatherList[i];
                break;
            }
        }
        if (!selectedWeather) selectedWeather = weatherList[0];
    } else {
        selectedWeather = weatherList[Math.floor(Math.random() * weatherList.length)];
    }
    
    // 保存缓存
    localStorage.setItem(cacheKey, JSON.stringify({
        date: dateKey,
        weather: selectedWeather
    }));
    
    return selectedWeather;
}

// 获取当前玩家所在城市的天气
function getCurrentCityWeather() {
    const cityName = affairData?.city || playerCity || '北京';
    return getTodayWeatherForCity(cityName);
}

function updateAffairButtons() {
    const d = affairData;
    const btnStart = document.getElementById('afBtnStart');
    const btnEnd = document.getElementById('afBtnEnd');
    const btnLeave = document.getElementById('afBtnLeave');
    const btnQuit = document.getElementById('afBtnQuit');

    // ===== 被开除 =====
    if (d.isFired) {
        // 只有找工作按钮可用，其他禁用
        [btnEnd, btnLeave, btnQuit].forEach(b => { 
            if (b) b.classList.add('affair-btn-disabled'); 
        });
        if (btnStart) {
            btnStart.classList.remove('affair-btn-disabled');  // ← 移除禁用样式
            btnStart.textContent = '🔵 重新找工作';
            btnStart.onclick = function() {
                d.isFired = false;
                saveAffair();
                updateAffairUI();
                findJob();  // 直接找工作
            };
        }
        return;
    }

    // ===== 没有工作 =====
    if (!d.job) {
        [btnEnd, btnLeave, btnQuit].forEach(b => { 
            if (b) b.classList.add('affair-btn-disabled'); 
        });
        if (btnStart) {
            btnStart.classList.remove('affair-btn-disabled');  // ← 移除禁用样式
            btnStart.textContent = '🔵 找工作';
            btnStart.onclick = findJob;
        }
        return;
    }

    // ===== 有工作（正常状态）=====
    [btnStart, btnEnd, btnLeave, btnQuit].forEach(b => { 
        if (b) b.classList.remove('affair-btn-disabled'); 
    });

    if (d.isOnLeave) {
        if (btnStart) {
            btnStart.textContent = '🔵 销假上班';
            btnStart.onclick = endLeave;
        }
        if (btnEnd) btnEnd.classList.add('affair-btn-disabled');
        if (btnLeave) {
            btnLeave.classList.add('affair-btn-disabled');
            btnLeave.textContent = '📋 休假中';
        }
        if (btnQuit) btnQuit.onclick = quitJob;
        return;
    }

    if (d.isWorking) {
        if (btnStart) {
            btnStart.classList.add('affair-btn-disabled');
            btnStart.textContent = '🔵 已打卡';
        }
        if (btnEnd) {
            btnEnd.classList.remove('affair-btn-disabled');
            btnEnd.textContent = '🔴 下班';
            btnEnd.onclick = endWork;
        }
        if (btnLeave) {
            btnLeave.classList.add('affair-btn-disabled');
            btnLeave.textContent = '📋 工作中不可请假';
        }
        if (btnQuit) btnQuit.onclick = quitJob;
        return;
    }

    // 未上班（有工作但没打卡）
    if (btnStart) {
        btnStart.classList.remove('affair-btn-disabled');
        btnStart.textContent = '🔵 上班';
        btnStart.onclick = startWork;
    }
    if (btnEnd) btnEnd.classList.add('affair-btn-disabled');
    if (btnLeave) {
        btnLeave.classList.remove('affair-btn-disabled');
        btnLeave.textContent = '📋 请假';
        btnLeave.onclick = startLeave;
    }
    if (btnQuit) btnQuit.onclick = quitJob;
}

function findJob() {
    if (affairData.isFired) { showToast('❌ 你被开除了'); return; }
    if (affairData.job) { showToast('⚠️ 已有工作'); return; }
    const job = jobs[Math.floor(Math.random() * jobs.length)];
    affairData.job = job.name;
    affairData.position = job.position;
    affairData.salary = job.salary;
    saveAffair();
    updateAffairUI();
    showToast('✅ 入职 ' + job.name + '，月薪 ¥' + job.salary);
}

function startWork() {
    if (!affairData.job || affairData.isFired) { showToast('❌ 没有工作'); return; }
    if (affairData.isWorking) { showToast('⚠️ 已工作中'); return; }
    if (affairData.isOnLeave) { showToast('📋 休假中'); return; }
    if (affairData.energy < 20) { showToast('❌ 精力不足'); return; }
    affairData.isWorking = true;
    affairData.workStartTime = Date.now();
    saveAffair();
    updateAffairUI();
    showToast('✅ 打卡上班！');
}

function endWork() {
    if (!affairData.isWorking) { showToast('⚠️ 未上班'); return; }
    const hours = Math.min((Date.now() - affairData.workStartTime) / 3600000, 8);
    const pay = Math.round((affairData.salary / 22 / 8) * hours);
    affairData.isWorking = false;
    affairData.totalWorkHours += hours;
    affairData.savings += pay;
    affairData.todayIncome += pay;
    affairData.monthIncome += pay;
    affairData.energy = Math.max(0, affairData.energy - hours * 5);
    affairData.mood = Math.max(0, affairData.mood - hours * 2);
    saveAffair();
    updateAffairUI();
    showToast('✅ 下班！收入 ¥' + pay);
}

function startLeave() {
    if (affairData.isWorking) { showToast('⚠️ 工作中不能请假'); return; }
    if (affairData.isOnLeave) { showToast('⚠️ 已休假'); return; }
    if (affairData.isFired) { showToast('❌ 已开除'); return; }
    const cost = Math.round(affairData.salary / 22 * 0.5);
    affairData.savings -= cost;
    affairData.todayExpense += cost;
    affairData.isOnLeave = true;
    saveAffair();
    updateAffairUI();
    showToast('📋 请假成功，扣 ¥' + cost);
}

function endLeave() {
    if (!affairData.isOnLeave) { showToast('⚠️ 未休假'); return; }
    affairData.isOnLeave = false;
    saveAffair();
    updateAffairUI();
    showToast('✅ 销假上班');
}

function quitJob() {
    if (!affairData.job) { showToast('⚠️ 无工作'); return; }
    if (affairData.isWorking) { showToast('⚠️ 先下班'); return; }
    if (affairData.isOnLeave) { showToast('⚠️ 休假中不能辞职'); return; }
    if (!confirm('确定辞职吗？')) return;
    affairData.job = null;
    affairData.position = null;
    affairData.salary = 0;
    affairData.isFired = false;
    saveAffair();
    updateAffairUI();
    showToast('🚪 已辞职');
}

function updateAffairTodo() {
    const container = document.getElementById('afTodoList');
    if (!container) return;
    const hour = new Date().getHours();
    const d = affairData;
    let todos = [];

    if (hour < 9) {
        todos.push({ icon: '🌅', text: '起床洗漱', time: '清晨', type: 'normal' });
        todos.push({ icon: '🍳', text: '吃早餐', time: '早上', type: 'important' });
        if (d.job && !d.isFired && !d.isWorking && !d.isOnLeave) todos.push({ icon: '💼', text: '去上班', time: '早上', type: 'urgent' });
    } else if (hour < 12) {
        if (d.isWorking) todos.push({ icon: '💻', text: '工作中...', time: '上午', type: 'important' });
        else if (d.job && !d.isFired) todos.push({ icon: '⏰', text: '该上班了！', time: '上午', type: 'urgent' });
        else todos.push({ icon: '📋', text: '找工作', time: '上午', type: 'important' });
    } else if (hour < 14) {
        todos.push({ icon: '🍱', text: '吃午饭', time: '中午', type: 'normal' });
        if (d.isWorking) todos.push({ icon: '☕', text: '午休时间', time: '中午', type: 'normal' });
    } else if (hour < 18) {
        if (d.isWorking) todos.push({ icon: '💻', text: '下午工作', time: '下午', type: 'important' });
        else if (d.job && !d.isFired) todos.push({ icon: '⏰', text: '下午班时间', time: '下午', type: 'urgent' });
        else todos.push({ icon: '📋', text: '投简历', time: '下午', type: 'important' });
    } else if (hour < 21) {
        todos.push({ icon: '🍜', text: '吃晚饭', time: '晚上', type: 'normal' });
        if (!d.isWorking) todos.push({ icon: '🎮', text: '自由时间', time: '晚上', type: 'normal' });
    } else {
        todos.push({ icon: '🛌', text: '准备休息', time: '深夜', type: 'normal' });
        todos.push({ icon: '🌙', text: '晚安', time: '深夜', type: 'normal' });
    }

    if (!d.job && !d.isFired && hour >= 9 && hour < 18) todos.unshift({ icon: '💼', text: '建议找份工作', time: '今日', type: 'urgent' });
    if (d.isFired) todos.unshift({ icon: '🚫', text: '被开除了，需重新找工作', time: '今日', type: 'urgent' });
    if (d.energy < 30) todos.unshift({ icon: '😴', text: '精力不足，建议休息', time: '今日', type: 'important' });

    const seen = new Set();
    const unique = todos.filter(t => { const key = t.text; if (seen.has(key)) return false;
        seen.add(key); return true; }).slice(0, 6);

    container.innerHTML = unique.map(t => `
        <div class="affair-todo-item ${t.type === 'urgent' ? 'urgent' : t.type === 'important' ? 'important' : 'normal'}">
            <span class="icon">${t.icon}</span>
            <span class="text">${t.text}</span>
            <span class="time-tag">${t.time}</span>
        </div>
    `).join('');

    const count = document.getElementById('afTodoCount');
    if (count) count.textContent = unique.length + ' 项';
}

// ===== 获取城市对象 =====
function getCityByName(name) {
    return CITY_DATA.find(c => c.name === name);
}

// ===== 获取城市居民（主播） =====
function getCityResidents(cityName) {
    const city = getCityByName(cityName);
    if (!city) return [];
    return city.residents || [];
}

// ===== 检查是否同城 =====
function isSameCity(cityName) {
    return playerCity === cityName;
}

// ===== 检查城市是否有可互动的人 =====
function hasResidents(cityName) {
    return getCityResidents(cityName).length > 0;
}

// ===== 获取城市等级颜色 =====
function getCityColor(level) {
    if (level === 1) return { glow: 'rgba(212,167,70,0.6)', core: '#ffd700', ring: '#d4a746' };
    if (level === 2) return { glow: 'rgba(212,167,70,0.35)', core: '#c9a84c', ring: '#b8953a' };
    return { glow: 'rgba(212,167,70,0.2)', core: '#a8843a', ring: '#8a6f2e' };
}

// ===== 地图鼠标事件（图片底图版） =====
document.addEventListener('mousemove', function(e) {
    const container = document.getElementById('mapContainer');
    if (!container || !container.classList.contains('active')) return;
    
    const dots = document.querySelectorAll('.city-dot');
    let found = null;
    dots.forEach(dot => {
        const rect = dot.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const dist = Math.sqrt((e.clientX - cx) ** 2 + (e.clientY - cy) ** 2);
        if (dist < 30) {
            found = dot.dataset.city;
        }
    });
    
    if (found !== hoveredCity) {
        hoveredCity = found;
        document.body.style.cursor = found ? 'pointer' : 'default';
    }
});

document.addEventListener('click', function(e) {
    const container = document.getElementById('mapContainer');
    if (!container || !container.classList.contains('active')) return;
    if (cityDetailOpen || travelOpen) return;

    const dots = document.querySelectorAll('.city-dot');
    let clicked = null;
    dots.forEach(dot => {
        const rect = dot.getBoundingClientRect();
        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;
        const dist = Math.sqrt((e.clientX - cx) ** 2 + (e.clientY - cy) ** 2);
        if (dist < 35) {
            clicked = CITY_DATA.find(c => c.name === dot.dataset.city);
        }
    });

    if (clicked) {
        openCityDetail(clicked);
    }
});

    const isCurrent = isSameCity(city.name);

    content.querySelector('#detailCityStatus').style.color = isCurrent ? '#4ecdc4' : '#888';

function renderTravelCities() {
    const list = document.getElementById('travelCityList');
    if (!list) return;

    list.innerHTML = '';
    const balance = affairData?.savings || 0;

    CITY_DATA.forEach(city => {
        const isCurrent = city.name === playerCity;
        const price = city.level === 1 ? 800 : city.level === 2 ? 500 : 300;
        const canAfford = balance >= price;

        const div = document.createElement('div');
        div.className = `city-option ${isCurrent ? 'current' : ''}`;
        div.innerHTML = `
            <div>
                <div class="name">${city.name} ${isCurrent ? '📍' : ''}</div>

            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <span class="price">✈️ ¥${price}</span>
                <button class="action" ${isCurrent || !canAfford ? 'disabled' : ''} onclick="travelToCity('${city.name}')">
                    ${isCurrent ? '已在这里' : !canAfford ? '余额不足' : '购买'}
                </button>
            </div>
        `;
        list.appendChild(div);
    });
}

// ===== 前往城市 =====
function travelToCity(cityName) {
    if (cityName === playerCity) {
        showToast('📍 你已在这个城市');
        return;
    }

    const city = getCityByName(cityName);
    if (!city) return;

    const price = city.level === 1 ? 800 : city.level === 2 ? 500 : 300;

    if ((affairData?.savings || 0) < price) {
        showToast('❌ 余额不足，需要 ¥' + price);
        return;
    }

    if (!confirm(`✈️ 确定前往 ${cityName}？\n机票费用：¥${price}\n当前余额：¥${affairData.savings.toLocaleString()}`)) {
        return;
    }

    // 扣钱
    affairData.savings -= price;
    saveAffair();

    // 更新玩家城市
    playerCity = cityName;
    localStorage.setItem('playerCity', playerCity);
    affairData.city = cityName;  
    saveAffair();               
    renderCityPoints(); 

    // 更新UI
    updateMapInfo();
    closeCityDetail();
    closeTravelModal();
    updateWeatherDisplay(); 

    showToast(`✈️ 已到达 ${cityName}！费用 ¥${price}`);

    // 检查是否有伙伴
    const residents = city.residents || [];
    if (residents.length > 0) {
        setTimeout(() => {
            showToast(`👋 ${residents.join('、')} 在这里等你`);
        }, 600);
    }
}

`;

    { id: 'rocket', name: '🚀 火箭', icon: '🚀', price: 500, desc: '超级礼物，好感大增' },
    { id: 'cake', name: '🎂 蛋糕', icon: '🎂', price: 100, desc: '甜蜜的礼物' },
    { id: 'diamond', name: '💎 钻石', icon: '💎', price: 2000, desc: '最珍贵的礼物' },
    { id: 'crown', name: '👑 皇冠', icon: '👑', price: 5000, desc: '至高无上的荣耀' },
];

// 打开背包
function openBackpack() {
    const modal = document.getElementById('backpackModal');
    if (!modal) {
        const div = document.createElement('div');
        div.id = 'backpackModal';
        div.className = 'backpack-modal';
        div.innerHTML = `
            <div class="backpack-content">
                <button class="close-btn" onclick="closeBackpack()">✕</button>
                <div class="backpack-header">
                    <div class="backpack-title">🎒 背包</div>
                    <div class="backpack-count">共 <span id="backpackCount">0</span> 件</div>
                </div>
                <div class="backpack-list" id="backpackList">
                    <div class="empty-backpack">背包空空如也<br><span style="font-size:12px;color:#888;">去商店购买物品吧</span></div>
                </div>
            </div>
        `;
        document.body.appendChild(div);
        div.addEventListener('click', function(e) {
            if (e.target === this) {
                closeBackpack();
            }
        });
    }
    
    renderBackpack();
    modal.classList.add('open');
}

function closeBackpack() {
    document.getElementById('backpackModal')?.classList.remove('open');
}

function renderBackpack() {
    const list = document.getElementById('backpackList');
    const count = document.getElementById('backpackCount');
    
    
    if (!list) return;
    if (inventory.length === 0) {
        list.innerHTML = `
            <div class="empty-backpack">
                <div style="font-size:40px;margin-bottom:10px;">🎒</div>
                背包空空如也
                <div style="font-size:12px;color:#888;margin-top:4px;">去商店购买物品吧</div>
            </div>
        `;
        if (count) count.textContent = '0';
        return;
    }
    
    if (count) count.textContent = inventory.length;
    
    // 统计每种物品的数量
    const itemCount = {};
    inventory.forEach(id => {
        itemCount[id] = (itemCount[id] || 0) + 1;
    });
    
    list.innerHTML = Object.keys(itemCount).map(id => {
        const item = SHOP_ITEMS.find(i => i.id === id);
        const num = itemCount[id];
        return `
            <div class="backpack-item">
                <div class="item-icon">${item?.icon || '📦'}</div>
                <div class="item-info">
                    <div class="item-name">${item?.name || id}</div>
                    <div class="item-desc">${item?.desc || '未知物品'}</div>
                </div>
                <div class="item-count">×${num}</div>
                <button class="item-use-btn" onclick="useItem('${id}')">使用</button>
            </div>
        `;
    }).join('');
}

function useItem(itemId) {
    const item = SHOP_ITEMS.find(i => i.id === itemId);
    if (!item) return;
    
    // 使用物品（这里简单实现送礼功能）
    const index = inventory.indexOf(itemId);
    if (index === -1) return;
    inventory.splice(index, 1);
    localStorage.setItem('inventory', JSON.stringify(inventory));
    
    // 如果是礼物类，找当前聊天的NPC送礼
    if (currentChatHost) {
        const gain = Math.floor(Math.random() * 5) + 2;
        addAffection(currentChatHost.name, gain);
        showToast(`🎁 送给 ${currentChatHost.name} ${item.name}，好感度 +${gain}`);
    } else {
        showToast(`🎁 使用了 ${item.name}，但不知道送给谁`);
    }
    
    renderBackpack();
    updateBackpackBadge();
}

// 购物函数（从商城购买）
function buyItem(itemId) {
    const item = SHOP_ITEMS.find(i => i.id === itemId);
    if (!item) return;
    
    if ((affairData.savings || 0) < item.price) {
        showToast('❌ 金币不够');
        return;
    }
    
    affairData.savings -= item.price;
    inventory.push(itemId);
    localStorage.setItem('inventory', JSON.stringify(inventory));
    saveAffair();
    
    renderShop();
    updateBackpackBadge();
    showToast(`✅ 购买了 ${item.name}`);
}
// ===== 右侧功能页面切换 =====
let currentAffairPage = null;

function switchAffairPage(page) {
    // 高亮图标
    document.querySelectorAll('.grid-item').forEach(item => {
        item.classList.toggle('active', item.dataset.page === page);
    });
    
    // 隐藏所有页面
    document.querySelectorAll('.affair-page').forEach(p => {
        p.style.display = 'none';
    });
    document.getElementById('pagePlaceholder').style.display = 'none';
    
    // 显示对应页面
    const target = document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1));
    if (target) {
        target.style.display = 'flex';
        target.style.flexDirection = 'column';
        target.style.height = '100%';
    }
    
    currentAffairPage = page;
    
    // 如果是背包，渲染背包内容
    if (page === 'backpack') {
        renderPageBackpack();
    }
}

function closeAffairPage() {
    // 取消高亮
    document.querySelectorAll('.grid-item').forEach(item => {
        item.classList.remove('active');
    });
    // 隐藏所有页面
    document.querySelectorAll('.affair-page').forEach(p => {
        p.style.display = 'none';
    });
    // 显示占位
    document.getElementById('pagePlaceholder').style.display = 'flex';
    currentAffairPage = null;
}

function renderPageBackpack() {
    const container = document.getElementById('pageBackpackBody');
    if (!container) return;
    
    if (inventory.length === 0) {
        container.innerHTML = `
            <div class="page-placeholder-content">
                <div style="font-size:40px;margin-bottom:10px;">🎒</div>
                <div style="font-size:16px;color:#888;">背包空空如也</div>
                <div style="font-size:13px;color:#666;margin-top:6px;">去商城购买物品吧</div>
            </div>
        `;
        return;
    }
    
    const itemCount = {};
    inventory.forEach(id => {
        itemCount[id] = (itemCount[id] || 0) + 1;
    });
    
    container.innerHTML = Object.keys(itemCount).map(id => {
        const item = SHOP_ITEMS.find(i => i.id === id);
        const num = itemCount[id];
        return `
            <div class="backpack-item" style="display:flex;align-items:center;gap:12px;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:8px;margin-bottom:6px;">
                <span style="font-size:24px;">${item?.icon || '📦'}</span>
                <span style="flex:1;color:#fff;">${item?.name || id}</span>
                <span style="color:#ffd700;">×${num}</span>
                <button class="item-use-btn" onclick="useItem('${id}')" style="padding:2px 12px;border-radius:4px;border:none;background:linear-gradient(135deg,#ffd700,#f0a500);color:#1a1a2e;font-size:12px;font-weight:bold;cursor:pointer;">使用</button>
            </div>
        `;
    }).join('');
}
// ===== 位置发送功能 =====
function sendLocation() {
    if (!popupCurrentHost) {
        showToast('❌ 请先打开聊天窗口');
        return;
    }
    
    // 获取当前城市
    const cityName = affairData?.city || playerCity || '北京';
    const city = getCityByName(cityName);
    
    // 发送位置消息
    const hostName = popupCurrentHost.name;
    if (!messageHistory[hostName]) messageHistory[hostName] = [];
    
    // ✅ 添加用户位置消息 - 显示为 "我的位置：城市名"
    messageHistory[hostName].push({ 
        sender: 'me', 
        type: 'location',
        location: cityName,
        text: `我的位置：${cityName}`
    });
    
    renderPopupMessages();
    localStorage.setItem('messageHistory', JSON.stringify(messageHistory));
    
    // 触发AI回复（带位置上下文）
    sendLocationAIResponse(hostName, cityName);
}

// ===== AI 回复位置消息 =====
async function sendLocationAIResponse(hostName, cityName) {
    const host = hosts.find(h => h.name === hostName);
    if (!host) return;
    
    // 显示正在输入
    const typingDiv = document.createElement('div');
    typingDiv.className = 'typing-indicator';
    typingDiv.innerText = '对方正在查看你的位置...';
    document.getElementById('popupMessages').appendChild(typingDiv);
    
    const city = getCityByName(cityName);
    const residents = city?.residents || [];
    const residentNames = residents.length > 0 ? residents.join('、') : '没有伙伴';
    
    const systemPrompt = `你是${hostName}，性格：${host.personality || '温柔可爱'}。
用户给你发了一个位置：${cityName}。
${cityName}的居民有：${residentNames}。

请根据以下情况回复：
1. 如果城市里有你认识的人，可以表达惊喜或想念
2. 回复 自然，带情感，或是疑问，或是厌恶
3. 上下文回答一定要连贯，不能突然很生硬的人机回答`;

    try {
        const response = await fetch(DEEPSEEK_API_URL, {
            method: 'POST',
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${DEEPSEEK_API_KEY}`
            },
            body: JSON.stringify({
                model: AI_MODEL,
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: `我目前在 ${cityName}，想和你分享我的位置` }
                ],
                temperature: 0.9,
                max_tokens: 100
            })
        });
        
        const data = await response.json();
        let reply = data.choices?.[0]?.message?.content || `哇，你在 ${cityName} 啊！那里一定很有趣~`;
        
        typingDiv.remove();
        
        // 打字机效果
        const tempBubble = document.createElement('div');
        tempBubble.className = 'message-bubble ai-message';
        document.getElementById('popupMessages').appendChild(tempBubble);
        await typeMessageForPopup(tempBubble, reply, 25);
        
        // 保存AI回复
        messageHistory[hostName].push({ sender: 'ai', text: reply });
        localStorage.setItem('messageHistory', JSON.stringify(messageHistory));
        
        // 增加好感度
        const gain = Math.floor(Math.random() * 2) + 1;
        addAffection(hostName, gain);
        
    } catch (error) {
        console.error('位置回复失败:', error);
        typingDiv.remove();
        const fallbackReply = `📍 ${cityName}！听说那里挺不错的，下次带我去玩好不好？`;
        const tempBubble = document.createElement('div');
        tempBubble.className = 'message-bubble ai-message';
        document.getElementById('popupMessages').appendChild(tempBubble);
        await typeMessageForPopup(tempBubble, fallbackReply, 25);
        messageHistory[hostName].push({ sender: 'ai', text: fallbackReply });
        localStorage.setItem('messageHistory', JSON.stringify(messageHistory));
    }
}
